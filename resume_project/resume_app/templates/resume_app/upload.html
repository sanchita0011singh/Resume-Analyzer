<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Analyzer</title>

     {% include 'resume_app/common/common_css.html' %}
    
    <style>
        body {
            background: linear-gradient(to right, #e3f2fd, #ffffff);
        }
        .card {
            border-radius: 15px;
        }
        h2 {
            font-weight: bold;
        }
        .btn-primary {
            width: 100%;
            font-size: 18px;
        }
    </style>
</head>

<body>
   {% include 'resume_app/common/header.html' %}
<div class="container mt-5">
    <div class="card shadow p-4 col-md-6 mx-auto">
        
        <h2 class="text-center mb-4">AI Resume Analyzer 🚀</h2>

        <!-- Upload Form -->
        <form method="POST" action="/result/" enctype="multipart/form-data">
        {% csrf_token %}

            <!-- File Upload -->
            <div class="mb-3">
                <label class="form-label">Upload Your Resume (PDF / DOCX)</label>
                <input type="file" name="resume" class="form-control" required>
            </div>

            <!-- Job Role Dropdown -->
            <div class="mb-3">
                <label class="form-label">Select Job Role</label>
                <select name="job_role" class="form-control" required>
                    <option value="">-- Select Role --</option>

                    <!-- Technical -->
                    <option value="Web Developer">Web Developer</option>
                    <option value="Frontend Developer">Frontend Developer</option>
                    <option value="Backend Developer">Backend Developer</option>
                    <option value="Full Stack Developer">Full Stack Developer</option>
                    <option value="Python Developer">Python Developer</option>
                    <option value="Data Analyst">Data Analyst</option>
                    <option value="AI Engineer">AI Engineer</option>

                    <!-- Non Technical -->
                    <option value="HR Manager">HR Manager</option>
                    <option value="Digital Marketing">Digital Marketing</option>
                    <option value="Project Manager">Project Manager</option>

                </select>
            </div>

            <!-- Submit Button -->
            <div class="text-center">
                <button type="submit" class="btn btn-primary">
                    Analyze Resume 🔍
                </button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
